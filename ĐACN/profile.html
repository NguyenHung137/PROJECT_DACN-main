<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkFinder – Hồ sơ của tôi</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800;900&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy:#0A1628; --blue:#2563EB; --blue2:#3B82F6;
            --orange:#F97316; --green:#10B981; --red:#EF4444;
            --light:#F8FAFC; --text:#1E293B; --muted:#64748B; --border:#E2E8F0;
        }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Be Vietnam Pro',sans-serif;background:var(--light);color:var(--text);min-height:100vh;}
        
        /* TOPBAR */
        .topbar{background:var(--navy);color:white;padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:64px;box-shadow:0 2px 20px rgba(10,22,40,0.3);position:sticky;top:0;z-index:100;}
        .tb-left{display:flex;align-items:center;gap:20px;}
        .back-btn{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,0.7);text-decoration:none;font-size:14px;font-weight:500;padding:8px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);transition:all .2s;}
        .back-btn:hover{background:rgba(255,255,255,0.1);color:white;}
        .tb-brand{font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;letter-spacing:-0.5px;}
        .tb-brand span{color:var(--orange);}

        .main-container { max-width: 1000px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 320px 1fr; gap: 24px; }
        
        /* CARDS */
        .card { background: white; border-radius: 20px; padding: 24px; border: 1px solid var(--border); box-shadow: 0 4px 16px rgba(10,22,40,0.04); margin-bottom: 24px; }
        .card-header { font-family: 'Outfit', sans-serif; font-size: 20px; font-weight: 700; color: var(--navy); margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
        
        /* AVATAR */
        .profile-summary { text-align: center; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, var(--blue), var(--blue2)); margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 40px; color: white; border: 4px solid white; box-shadow: 0 8px 24px rgba(37,99,235,0.3); }
        .p-name { font-size: 20px; font-weight: 700; color: var(--navy); font-family: 'Outfit', sans-serif; }
        .p-role { font-size: 13px; color: var(--muted); margin-top: 4px; display: inline-block; padding: 4px 12px; background: var(--light); border-radius: 50px; font-weight: 600; }

        /* FORM */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 8px; }
        .form-control { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 10px; font-family: inherit; font-size: 14px; transition: all .2s; outline: none; background: var(--light); }
        .form-control:focus { border-color: var(--blue); background: white; box-shadow: 0 0 0 4px rgba(37,99,235,0.1); }
        .btn-save { width: 100%; padding: 14px; background: var(--blue); color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: all .2s; font-family: inherit; margin-top: 10px; }
        .btn-save:hover { background: #1d4ed8; transform: translateY(-1px); box-shadow: 0 8px 20px rgba(37,99,235,0.3); }

        /* VEHICLES */
        .vehicle-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .vehicle-item { display: flex; align-items: center; justify-content: space-between; padding: 16px; border: 1px solid var(--border); border-radius: 12px; transition: all .2s; }
        .vehicle-item:hover { border-color: var(--blue); box-shadow: 0 4px 12px rgba(37,99,235,0.08); background: #f8fafc; }
        .v-info { display: flex; align-items: center; gap: 16px; }
        .v-icon { width: 44px; height: 44px; border-radius: 12px; background: rgba(37,99,235,0.1); display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .v-plate { font-family: 'Outfit', sans-serif; font-size: 18px; font-weight: 700; color: var(--navy); }
        .v-desc { font-size: 13px; color: var(--muted); margin-top: 2px; }
        .btn-del { width: 36px; height: 36px; border-radius: 8px; border: none; background: rgba(239,68,68,0.1); color: var(--red); cursor: pointer; transition: all .2s; font-size: 16px; display: flex; align-items: center; justify-content: center; }
        .btn-del:hover { background: var(--red); color: white; }

        .btn-add-vehicle { padding: 10px 16px; border-radius: 8px; background: rgba(249,115,22,0.1); color: var(--orange); border: 1px solid rgba(249,115,22,0.2); font-weight: 600; cursor: pointer; font-size: 13px; transition: all .2s; display: inline-flex; align-items: center; gap: 6px; }
        .btn-add-vehicle:hover { background: var(--orange); color: white; }

        /* MODAL */
        .modal-overlay { position: fixed; inset: 0; background: rgba(10,22,40,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-overlay.show { display: flex; animation: fadeIn .2s; }
        .modal-box { background: white; width: 90%; max-width: 400px; border-radius: 20px; padding: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); animation: scaleUp .2s; }
        @keyframes fadeIn { from {opacity:0} to {opacity:1} }
        @keyframes scaleUp { from {transform:scale(0.95)} to {transform:scale(1)} }
        
        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(50px); padding: 12px 24px; background: var(--green); color: white; border-radius: 50px; font-weight: 600; font-size: 14px; opacity: 0; transition: all .3s; z-index: 2000; box-shadow: 0 10px 30px rgba(16,185,129,0.4); }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        @media (max-width: 768px) {
            .main-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="tb-left">
        <a href="user.html" class="back-btn">← Bản đồ</a>
        <div class="tb-brand">Park<span>Finder</span></div>
    </div>
</div>

<div class="main-container">
    <!-- LEFT SIDE: Profile Info -->
    <div class="left-side">
        <div class="card profile-summary">
            <div class="avatar" id="avText">U</div>
            <div class="p-name" id="dispName">Đang tải...</div>
            <div class="p-role">🚗 Thành viên</div>
        </div>
        
        <div class="card">
            <div class="card-header">Thông tin cá nhân</div>
            <div class="form-group">
                <label>Họ và tên</label>
                <input type="text" class="form-control" id="uName">
            </div>
            <div class="form-group">
                <label>Số điện thoại</label>
                <input type="text" class="form-control" id="uPhone" placeholder="Chưa cập nhật">
            </div>
            <button class="btn-save" onclick="saveProfile()">💾 Lưu thay đổi</button>
        </div>
    </div>

    <!-- RIGHT SIDE: Vehicles -->
    <div class="right-side">
        <div class="card">
            <div class="card-header">
                Phương tiện của bạn
                <button class="btn-add-vehicle" onclick="openVehicleModal()">+ Thêm xe</button>
            </div>
            <div class="vehicle-list" id="vList">
                <div style="text-align:center;padding:30px;color:var(--muted)">Đang tải...</div>
            </div>
        </div>
    </div>
</div>

<!-- Add Vehicle Modal -->
<div class="modal-overlay" id="vModal">
    <div class="modal-box">
        <h3 style="margin-bottom:20px;font-family:'Outfit',sans-serif;color:var(--navy)">Thêm phương tiện mới</h3>
        <div class="form-group">
            <label>Biển số xe</label>
            <input type="text" class="form-control" id="vPlate" placeholder="VD: 51H-123.45">
        </div>
        <div class="form-group">
            <label>Loại xe</label>
            <select class="form-control" id="vType">
                <option value="car">🚗 Ô tô</option>
                <option value="moto">🏍️ Xe máy</option>
            </select>
        </div>
        <div class="form-group">
            <label>Màu sắc</label>
            <input type="text" class="form-control" id="vColor" placeholder="VD: Trắng, Đen...">
        </div>
        <div style="display:flex;gap:10px;margin-top:24px">
            <button class="btn-save" style="background:white;color:var(--muted);border:1px solid var(--border);box-shadow:none" onclick="closeVehicleModal()">Hủy</button>
            <button class="btn-save" onclick="saveVehicle()">Xác nhận</button>
        </div>
    </div>
</div>

<div class="toast" id="toast">Cập nhật thành công!</div>

<script>
    if (sessionStorage.getItem('userLoggedIn') !== 'true') window.location.href = 'login.html';

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    // Load Profile
    function loadProfile() {
        const name = sessionStorage.getItem('userName') || 'Khách';
        const phone = localStorage.getItem('userPhone') || '';
        document.getElementById('dispName').textContent = name;
        document.getElementById('avText').textContent = name.charAt(0).toUpperCase();
        document.getElementById('uName').value = name;
        document.getElementById('uPhone').value = phone;
    }

    function saveProfile() {
        const name = document.getElementById('uName').value.trim();
        const phone = document.getElementById('uPhone').value.trim();
        if(!name) return showToast('Vui lòng nhập tên');
        sessionStorage.setItem('userName', name);
        localStorage.setItem('userPhone', phone);
        loadProfile();
        showToast('Đã lưu thông tin cá nhân!');
    }

    // Vehicle Management
    function getVehicles() {
        try { return JSON.parse(localStorage.getItem('pkf_vehicles') || '[]'); } catch { return []; }
    }
    
    function setVehicles(list) {
        localStorage.setItem('pkf_vehicles', JSON.stringify(list));
        renderVehicles();
    }

    function renderVehicles() {
        const list = getVehicles();
        const vList = document.getElementById('vList');
        if (list.length === 0) {
            vList.innerHTML = '<div style="text-align:center;padding:30px;color:var(--muted);background:#f8fafc;border-radius:12px;border:1px dashed var(--border)">Bạn chưa thêm phương tiện nào. Vui lòng bấm Thêm xe.</div>';
            return;
        }
        vList.innerHTML = list.map((v, i) => `
            <div class="vehicle-item">
                <div class="v-info">
                    <div class="v-icon">${v.type === 'car' ? '🚗' : '🏍️'}</div>
                    <div>
                        <div class="v-plate">${v.plate}</div>
                        <div class="v-desc">${v.color}</div>
                    </div>
                </div>
                <button class="btn-del" onclick="deleteVehicle(${i})" title="Xóa">🗑️</button>
            </div>
        `).join('');
    }

    function deleteVehicle(index) {
        if(confirm('Bạn có chắc chắn muốn xóa phương tiện này?')) {
            const list = getVehicles();
            list.splice(index, 1);
            setVehicles(list);
            showToast('Đã xóa phương tiện!');
        }
    }

    // Modal
    function openVehicleModal() {
        document.getElementById('vPlate').value = '';
        document.getElementById('vColor').value = '';
        document.getElementById('vModal').classList.add('show');
    }
    function closeVehicleModal() { document.getElementById('vModal').classList.remove('show'); }

    function saveVehicle() {
        const plate = document.getElementById('vPlate').value.trim().toUpperCase();
        const type = document.getElementById('vType').value;
        const color = document.getElementById('vColor').value.trim();
        
        if(!plate) return alert('Vui lòng nhập biển số xe!');
        
        const list = getVehicles();
        list.push({ plate, type, color });
        setVehicles(list);
        closeVehicleModal();
        showToast('Đã thêm phương tiện mới!');
    }

    // Init
    loadProfile();
    renderVehicles();
</script>
</body>
</html>

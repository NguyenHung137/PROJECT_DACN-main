<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkFinder – Trợ Giúp & Báo Cáo</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800;900&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy:#0A1628; --blue:#2563EB; --blue2:#3B82F6;
            --orange:#F97316; --green:#10B981; --red:#EF4444;
            --light:#F8FAFC; --text:#1E293B; --muted:#64748B; --border:#E2E8F0;
        }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Be Vietnam Pro',sans-serif;background:var(--light);color:var(--text);min-height:100vh;}

        .topbar{background:var(--navy);color:white;padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:64px;box-shadow:0 2px 20px rgba(10,22,40,0.3);}
        .tb-left{display:flex;align-items:center;gap:20px;}
        .back-btn{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,0.7);text-decoration:none;font-size:14px;font-weight:500;padding:8px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);transition:all .2s;}
        .back-btn:hover{background:rgba(255,255,255,0.1);color:white;}
        .tb-brand{font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;}
        .tb-brand span{color:var(--orange);}

        .main{max-width:1000px;margin:40px auto;padding:0 24px;display:grid;grid-template-columns:1.5fr 1fr;gap:30px;}
        @media(max-width:768px){ .main{grid-template-columns:1fr;} }
        
        .card{background:white;border-radius:16px;border:1px solid var(--border);padding:30px;}
        .card-title{font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;color:var(--navy);margin-bottom:20px;}
        
        .form-group{margin-bottom:20px;}
        .form-label{display:block;font-size:14px;font-weight:bold;margin-bottom:8px;color:var(--navy);}
        .form-input{width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;font-family:inherit;}
        .form-input:focus{outline:none;border-color:var(--blue);}
        textarea.form-input{resize:vertical;min-height:120px;}
        
        .btn-submit{display:inline-block;padding:12px 24px;background:var(--blue);color:white;border:none;border-radius:8px;font-size:15px;font-weight:bold;cursor:pointer;transition:background 0.2s;width:100%;}
        .btn-submit:hover{background:var(--navy);}

        .ticket-item{padding:15px;border:1px solid var(--border);border-radius:10px;margin-bottom:15px;}
        .ticket-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
        .ticket-subj{font-weight:bold;color:var(--navy);}
        .ticket-status{padding:4px 10px;border-radius:50px;font-size:11px;font-weight:bold;}
        .status-OPEN{background:rgba(249,115,22,0.1);color:var(--orange);}
        .status-CLOSED{background:rgba(16,185,129,0.1);color:var(--green);}
        .ticket-date{font-size:12px;color:var(--muted);}
        .ticket-msg{font-size:13px;color:var(--text);margin-top:8px;background:#f8fafc;padding:10px;border-radius:6px;}

    </style>
</head>
<body>

<div class="topbar">
    <div class="tb-left">
        <a href="user.html" class="back-btn">← Quay lại bản đồ</a>
        <div class="tb-brand">Park<span>Finder</span></div>
    </div>
</div>

<div class="main">
    <div class="card">
        <div class="card-title">🎧 Gửi yêu cầu hỗ trợ</div>
        <p style="color:var(--muted);margin-bottom:20px;font-size:14px;">Bạn gặp sự cố với hệ thống? Hãy gửi phản hồi cho chúng tôi, đội ngũ hỗ trợ sẽ xử lý sớm nhất có thể.</p>
        
        <form id="supportForm" onsubmit="submitTicket(event)">
            <div class="form-group">
                <label class="form-label">Vấn đề bạn gặp phải là gì?</label>
                <select id="subject" class="form-input" required>
                    <option value="">-- Chọn chủ đề --</option>
                    <option value="Lỗi thanh toán / Trừ tiền sai">Lỗi thanh toán / Trừ tiền sai</option>
                    <option value="Đến nơi nhưng bãi đỗ đầy">Đến nơi nhưng bãi đỗ đầy</option>
                    <option value="Lỗi định vị / Chỉ đường">Lỗi định vị / Chỉ đường</option>
                    <option value="Tài khoản & Đăng nhập">Tài khoản & Đăng nhập</option>
                    <option value="Phản ánh nhân viên bãi xe">Phản ánh nhân viên bãi xe</option>
                    <option value="Khác">Khác</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label">Chi tiết sự cố</label>
                <textarea id="message" class="form-input" placeholder="Vui lòng mô tả chi tiết sự cố bạn đang gặp phải..." required></textarea>
            </div>
            
            <button type="submit" class="btn-submit">Gửi Yêu Cầu Hỗ Trợ</button>
        </form>
    </div>

    <div class="card">
        <div class="card-title">📋 Lịch sử yêu cầu</div>
        <div id="ticketList">
            <div style="color:var(--muted);text-align:center;padding:20px;">Đang tải...</div>
        </div>
    </div>
</div>

<script>
if (sessionStorage.getItem('userLoggedIn') !== 'true') window.location.href = 'login.html';
const userName = sessionStorage.getItem('userName');

async function submitTicket(e) {
    e.preventDefault();
    const subject = document.getElementById('subject').value;
    const message = document.getElementById('message').value;

    const btn = document.querySelector('.btn-submit');
    btn.textContent = 'Đang gửi...';
    btn.disabled = true;

    try {
        const res = await fetch('http://localhost:8080/api/support', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userName, subject, message })
        });
        if (res.ok) {
            alert('Gửi yêu cầu thành công! Chúng tôi sẽ sớm phản hồi.');
            document.getElementById('supportForm').reset();
            loadTickets();
        } else {
            alert('Có lỗi xảy ra!');
        }
    } catch(err) {
        alert('Lỗi kết nối máy chủ!');
    } finally {
        btn.textContent = 'Gửi Yêu Cầu Hỗ Trợ';
        btn.disabled = false;
    }
}

async function loadTickets() {
    try {
        const res = await fetch(`http://localhost:8080/api/support/user/${userName}`);
        const data = await res.json();
        const list = document.getElementById('ticketList');
        
        if (!data.length) {
            list.innerHTML = '<div style="color:var(--muted);text-align:center;padding:20px;">Bạn chưa gửi yêu cầu nào.</div>';
            return;
        }

        list.innerHTML = data.map(t => `
            <div class="ticket-item">
                <div class="ticket-header">
                    <div class="ticket-subj">${t.subject}</div>
                    <div class="ticket-status status-${t.status}">${t.status === 'OPEN' ? 'Đang xử lý' : 'Đã giải quyết'}</div>
                </div>
                <div class="ticket-date">${new Date(t.createdAt).toLocaleString('vi-VN')}</div>
                <div class="ticket-msg">${t.message}</div>
            </div>
        `).join('');
    } catch(err) {
        document.getElementById('ticketList').innerHTML = '<div style="color:red;text-align:center;">Lỗi tải dữ liệu</div>';
    }
}

loadTickets();
</script>
</body>
</html>

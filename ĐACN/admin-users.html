<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkFinder – Quản lý Người dùng</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800;900&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy:#0A1628; --blue:#2563EB; --blue2:#3B82F6;
            --orange:#F97316; --green:#10B981; --red:#EF4444;
            --light:#F8FAFC; --text:#1E293B; --muted:#64748B; --border:#E2E8F0;
        }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Be Vietnam Pro',sans-serif;background:var(--light);color:var(--text);min-height:100vh;}

        .topbar{background:var(--navy);color:white;padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:64px;box-shadow:0 2px 20px rgba(10,22,40,0.3);}
        .tb-left{display:flex;align-items:center;gap:20px;}
        .back-btn{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,0.7);text-decoration:none;font-size:14px;font-weight:500;padding:8px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);transition:all .2s;}
        .back-btn:hover{background:rgba(255,255,255,0.1);color:white;}
        .tb-brand{font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;}
        .tb-brand span{color:var(--orange);}

        .main{max-width:1200px;margin:40px auto;padding:0 24px;}
        
        .card{background:white;border-radius:16px;border:1px solid var(--border);overflow:hidden;}
        .card-header{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--border);background:var(--light);}
        .card-title{font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;color:var(--navy);}
        
        .search-box{padding:8px 16px;border:1px solid var(--border);border-radius:8px;font-family:inherit;width:300px;}
        .search-box:focus{outline:none;border-color:var(--blue);}

        .tbl{width:100%;border-collapse:collapse;}
        .tbl th{text-align:left;padding:12px 24px;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);background:#F8FAFC;}
        .tbl td{padding:16px 24px;border-bottom:1px solid var(--light);font-size:14px;}
        .tbl tr:hover td{background:#f8fafc;}

        .status-badge{display:inline-block;padding:4px 10px;border-radius:50px;font-size:12px;font-weight:bold;}
        .status-active{background:rgba(16,185,129,0.1);color:var(--green);}
        .status-locked{background:rgba(239,68,68,0.1);color:var(--red);}

        .action-btn{padding:6px 12px;border:none;border-radius:6px;font-size:13px;font-weight:bold;cursor:pointer;transition:all 0.2s;}
        .btn-lock{background:rgba(239,68,68,0.1);color:var(--red);}
        .btn-lock:hover{background:var(--red);color:white;}
        .btn-unlock{background:rgba(16,185,129,0.1);color:var(--green);}
        .btn-unlock:hover{background:var(--green);color:white;}
        
    </style>
</head>
<body>

<div class="topbar">
    <div class="tb-left">
        <a href="dashboard.html" class="back-btn">← Quay lại Dashboard</a>
        <div class="tb-brand">Park<span>Finder</span></div>
    </div>
</div>

<div class="main">
    <div class="card">
        <div class="card-header">
            <div class="card-title">👥 Quản lý Người dùng</div>
            <input type="text" id="searchUser" class="search-box" placeholder="🔍 Tìm kiếm theo tên hoặc username..." oninput="filterUsers()">
        </div>
        <table class="tbl">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Họ Tên</th>
                    <th>Username</th>
                    <th>Số điện thoại</th>
                    <th>Trạng thái</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody id="userList">
                <tr><td colspan="6" style="text-align:center;padding:30px;color:var(--muted)">Đang tải...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
if (sessionStorage.getItem('adminLoggedIn') !== 'true') window.location.href = 'login.html?role=admin';

let allUsers = [];

async function loadUsers() {
    try {
        const res = await fetch('http://localhost:8080/api/user/all');
        allUsers = await res.json();
        renderUsers(allUsers);
    } catch(err) {
        document.getElementById('userList').innerHTML = '<tr><td colspan="6" style="text-align:center;color:red;">Lỗi kết nối</td></tr>';
    }
}

function renderUsers(users) {
    const tbody = document.getElementById('userList');
    if (!users.length) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--muted);">Không tìm thấy người dùng</td></tr>';
        return;
    }
    
    tbody.innerHTML = users.map(u => {
        const isActive = u.isActive !== false; // null or true means active
        const statusClass = isActive ? 'status-active' : 'status-locked';
        const statusText = isActive ? 'Đang hoạt động' : 'Đã khóa';
        
        const btnClass = isActive ? 'btn-lock' : 'btn-unlock';
        const btnText = isActive ? '🔒 Khóa' : '🔓 Mở khóa';
        
        return `
            <tr>
                <td style="color:var(--muted)">#${u.id}</td>
                <td style="font-weight:bold;color:var(--navy)">${u.fullName}</td>
                <td>${u.username}</td>
                <td>${u.phone || '—'}</td>
                <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                <td>
                    <button class="action-btn ${btnClass}" onclick="toggleStatus(${u.id})">${btnText}</button>
                </td>
            </tr>
        `;
    }).join('');
}

function filterUsers() {
    const q = document.getElementById('searchUser').value.toLowerCase();
    const filtered = allUsers.filter(u => 
        (u.fullName || '').toLowerCase().includes(q) || 
        (u.username || '').toLowerCase().includes(q)
    );
    renderUsers(filtered);
}

async function toggleStatus(id) {
    if (!confirm('Bạn có chắc chắn muốn thay đổi trạng thái tài khoản này?')) return;
    
    try {
        const res = await fetch(`http://localhost:8080/api/user/${id}/toggle-status`, { method: 'PUT' });
        const data = await res.json();
        if (data.success) {
            loadUsers(); // reload to reflect changes
        } else {
            alert(data.message);
        }
    } catch(err) {
        alert('Lỗi kết nối');
    }
}

loadUsers();
</script>
</body>
</html>
